<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Famiglia</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        html, body {width: 100%; height: 100%; overflow-x: hidden;}
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px;
        }
        .container {
            background: rgba(20, 20, 30, 0.95); border-radius: 15px; padding: 15px;
            max-width: 600px; width: 100%; box-shadow: 0 10px 50px rgba(0,0,0,0.3); color: white;
            region {display: block; width: 100%;}
        }
        #loginScreen {display: flex; flex-direction: column; gap: 20px;}
        #mainApp {display: none;}
        h1 {
            font-size: 24px; margin-bottom: 10px; text-align: center;
            background: linear-gradient(45deg, #FFD700, #FFA500);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .login-box {background: rgba(255,255,255,0.05); padding: 30px; border-radius: 10px; text-align: center;}
        .login-box h2 {margin-bottom: 20px;}
        .login-box input {width: 100%; padding: 12px; margin-bottom: 15px; border: none; border-radius: 5px; font-size: 16px;}
        .btn {
            background: linear-gradient(45deg, #FFD700, #FFA500); color: #000; border: none;
            padding: 12px 30px; border-radius: 25px; cursor: pointer; font-size: 16px;
            font-weight: bold; transition: transform 0.2s;
        }
        .btn:hover {transform: scale(1.05);}
        .user-info {text-align: right; margin-bottom: 15px; font-size: 14px;}
        .user-info button {
            background: #f44336; color: white; border: none; padding: 5px 15px;
            border-radius: 15px; cursor: pointer; margin-left: 10px;
        }
        .form-row {display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;}
        .form-row input, .form-row select {
            flex: 1; min-width: 120px; padding: 10px; border: none; border-radius: 5px; font-size: 14px;
        }
        .stats {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px; margin-bottom: 15px;
        }
        .stat-card {background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; text-align: center;}
        .stat-card h3 {font-size: 14px; margin-bottom: 8px; opacity: 0.8;}
        .stat-card p {font-size: 20px; font-weight: bold; color: #FFD700;}
        .nav-buttons {display: flex; gap: 10px; margin-bottom: 15px;}
        .nav-buttons button {
            flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer;
            font-size: 14px; font-weight: bold; background: rgba(255,255,255,0.1);
            color: white; transition: background 0.3s;
        }
        .nav-buttons button.active {background: linear-gradient(45deg, #FFD700, #FFA500); color: #000;}
        #historyList, #piggyHistoryList {max-height: 400px; overflow-y: auto;}
        .transaction-item {
            background: rgba(255,255,255,0.05); padding: 12px; margin-bottom: 8px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .transaction-item.entrata {border-left: 4px solid #4CAF50;}
        .transaction-item.uscita {border-left: 4px solid #f44336;}
        .transaction-info {flex: 1;}
        .transaction-amount {font-size: 18px; font-weight: bold;}
        .transaction-amount.entrata {color: #4CAF50;}
        .transaction-amount.uscita {color: #f44336;}
        .delete-btn {
            background: #f44336; color: white; border: none; padding: 8px 15px;
            border-radius: 5px; cursor: pointer; margin-left: 10px;
        }
        .filters {display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; align-items: center;}
        .filters select {flex: 0 0 auto; min-width: 120px; padding: 8px; border: none; border-radius: 5px;}
        .filters label {font-size: 14px;}
        .page {display: none;}
        .page.active {display: block;}
        .error-message {
            background: #f44336; color: white; padding: 10px; border-radius: 5px;
            margin-bottom: 15px; text-align: center; display: none;
        }
        @media (max-width: 600px) {
            .form-row {flex-direction: column;}
            .form-row input, .form-row select {width: 100%;}
        }
        .tabella-cassa {width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-top: 15px;}
        .tabella-cassa th, .tabella-cassa td {border: 1px solid #444; padding: 8px; text-align: left;}
        .tabella-cassa thead th {background: #FFD700; color: #000; font-weight: bold; position: sticky; top: 0;}
        .tabella-cassa tbody tr:nth-child(even) {background: rgba(255,255,255,0.03);}
        .tabella-cassa td.entrata {color: #4CAF50; font-weight: 600;}
        .tabella-cassa td.uscita {color: #f44336; font-weight: 600;}
        .tabella-cassa td.saldo {background: rgba(76,175,80,0.15); font-weight: 600;}
        .tabella-cassa tbody tr:hover {background: rgba(255,255,255,0.08); cursor: pointer;}
        .totali-cassa {display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;}
        .totali-cassa > div {flex: 1; min-width: 120px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; text-align: center;}
    </style>
</head>
<body>
<div class="container">
<body>
  <div id="login-page" class="page active">
    <h1>Budget Famiglia</h1>
    <button id="login-btn">Accedi con Google</button>
    <div id="error-message" class="error-message"></div>
  </div>

  <div id="main-page" class="page">
    <div class="header">
      <h1>Budget Famiglia</h1>
      <button id="logout-btn">Logout</button>
    </div>

    <div class="stats">
      <div class="stat-card entrate">
        <h3>Entrate</h3>
        <p id="totale-entrate">€0.00</p>
      </div>
      <div class="stat-card uscite">
        <h3>Uscite</h3>
        <p id="totale-uscite">€0.00</p>
      </div>
      <div class="stat-card saldo">
        <h3>Saldo</h3>
        <p id="saldo-totale">€0.00</p>
      </div>
      <div class="stat-card salvadanaio">
        <h3>Salvadanaio</h3>
        <p id="totale-salvadanaio">€0.00</p>
      </div>
    </div>

    <div class="form-row">
      <input type="text" id="descrizione" placeholder="Descrizione">
      <input type="number" id="importo" placeholder="Importo" step="0.01">
      <select id="tipo">
        <option value="entrata">Entrata</option>
        <option value="uscita">Uscita</option>
      </select>
      <button id="aggiungi-btn">Aggiungi</button>
    </div>

    <div class="filters">
      <select id="filtro-tipo">
        <option value="">Tutti</option>
        <option value="entrata">Entrate</option>
        <option value="uscita">Uscite</option>
      </select>
      <label><input type="checkbox" id="mostra-eliminati"> Mostra eliminati</label>
    </div>

    <table class="tabella-cassa">
      <thead>
        <tr>
          <th>Data</th>
          <th>Descrizione</th>
          <th>Entrata</th>
          <th>Uscita</th>
          <th>Saldo</th>
          <th>Azioni</th>
        </tr>
      </thead>
      <tbody id="tabella-body"></tbody>
    </table>

    <div class="backup-buttons">
      <button id="backup-btn">Backup Dati</button>
      <button id="restore-btn">Ripristina Backup</button>
      <input type="file" id="file-input" accept=".json" style="display:none">
    </div>
  </div>

  <script type="module">
    import { initializeApp } from './firebase.js';
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from './firebase.js';
    import { getDatabase, ref, push, set, onValue, remove, update } from './firebase.js';

    const firebaseConfig = {
      apiKey: "AIzaSyB8E0t2dRpB8ds9nh5VEBJ8rPIyfGRFg0Y",
      authDomain: "AIzaSyB8E0t2budget-famiglia-4477edRpB8ds9nh5VEBJ8rPIyfGRFg0Y.firebaseapp.com",
      databaseURL: "https://AIzaSyB8E0t2budget-famiglia-4477edRpB8ds9nh5VEBJ8rPIyfGRFg0Y-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "AIzaSyB8E0t2budget-famiglia-4477edRpB8ds9nh5VEBJ8rPIyfGRFg0Y",
      storageBucket: "AIzaSyB8E0t2budget-famiglia-4477edRpB8ds9nh5VEBJ8rPIyfGRFg0Y.firebasestorage.app",
      messagingSenderId: "AIzaSyB8E0t2915933306200budget-famiglia-4477edRpB8ds9nh5VEBJ8rPIyfGRFg0Y",
      appId: "1:AIzaSyB8E0t2915933306200budget-famiglia-4477edRpB8ds9nh5VEBJ8rPIyfGRFg0Y:web:b30e6f4a2ef1e4f7be7b13"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let transactions = [];

    const loginPage = document.getElementById('login-page');
    const mainPage = document.getElementById('main-page');
    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const errorMessage = document.getElementById('error-message');

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        loginPage.classList.remove('active');
        mainPage.classList.add('active');
        caricaDatiUtente();
      } else {
        currentUser = null;
        mainPage.classList.remove('active');
        loginPage.classList.add('active');
      }
    });

    loginBtn.addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        errorMessage.textContent = 'Errore login: ' + error.message;
      }
    });

    logoutBtn.addEventListener('click', async () => {
      await signOut(auth);
    });

    function caricaDatiUtente() {
      if (!currentUser) return;

      const transactionsRef = ref(database, `transactions/${currentUser.uid}`);
      onValue(transactionsRef, (snapshot) => {
        transactions = [];
        snapshot.forEach((childSnapshot) => {
          transactions.push({
            id: childSnapshot.key,
            ...childSnapshot.val()
          });
        });
        aggiornaTabella();
        aggiornaTotali();
      });

      const piggyBankRef = ref(database, `piggybank/${currentUser.uid}`);
      onValue(piggyBankRef, (snapshot) => {
        const amount = snapshot.val() || 0;
        document.getElementById('totale-salvadanaio').textContent = `€${amount.toFixed(2)}`;
      });
    }

    document.getElementById('aggiungi-btn').addEventListener('click', () => {
      const descrizione = document.getElementById('descrizione').value.trim();
      const importo = parseFloat(document.getElementById('importo').value);
      const tipo = document.getElementById('tipo').value;

      if (!descrizione || isNaN(importo) || importo <= 0) {
        alert('Inserisci descrizione e importo validi');
        return;
      }

      if (!currentUser) return;

      const transactionsRef = ref(database, `transactions/${currentUser.uid}`);
      const newTransactionRef = push(transactionsRef);
      set(newTransactionRef, {
        descrizione,
        importo,
        tipo,
        data: new Date().toISOString(),
        eliminato: false
      });

      document.getElementById('descrizione').value = '';
      document.getElementById('importo').value = '';
    });

    function aggiornaTabella() {
      const tbody = document.getElementById('tabella-body');
      tbody.innerHTML = '';

      const filtroTipo = document.getElementById('filtro-tipo').value;
      const mostraEliminati = document.getElementById('mostra-eliminati').checked;

      let transazioniFiltrate = transactions.filter(t => {
        if (!mostraEliminati && t.eliminato) return false;
        if (filtroTipo && t.tipo !== filtroTipo) return false;
        return true;
      });

      transazioniFiltrate.sort((a, b) => new Date(b.data) - new Date(a.data));

      let saldoProgressivo = 0;
      transazioniFiltrate.reverse().forEach(t => {
        if (!t.eliminato) {
          saldoProgressivo += t.tipo === 'entrata' ? t.importo : -t.importo;
        }

        const tr = document.createElement('tr');
        if (t.eliminato) tr.style.backgroundColor = '#ffcccc';

        const dataObj = new Date(t.data);
        const dataFormattata = dataObj.toLocaleDateString('it-IT');

        tr.innerHTML = `
          <td>${dataFormattata}</td>
          <td>${t.descrizione}</td>
          <td class="transaction-amount entrata">${t.tipo === 'entrata' ? '€' + t.importo.toFixed(2) : ''}</td>
          <td class="transaction-amount uscita">${t.tipo === 'uscita' ? '€' + t.importo.toFixed(2) : ''}</td>
          <td>${'€' + saldoProgressivo.toFixed(2)}</td>
          <td>
            ${!t.eliminato ? `<button class="delete-btn" data-id="${t.id}">Elimina</button>` : ''}
          </td>
        `;

        tbody.appendChild(tr);
      });

      document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = e.target.dataset.id;
          if (confirm('Eliminare questa transazione?')) {
            const transactionRef = ref(database, `transactions/${currentUser.uid}/${id}`);
            update(transactionRef, { eliminato: true });
          }
        });
      });
    }

    function aggiornaTotali() {
      let totaleEntrate = 0;
      let totaleUscite = 0;

      transactions.forEach(t => {
        if (!t.eliminato) {
          if (t.tipo === 'entrata') {
            totaleEntrate += t.importo;
          } else {
            totaleUscite += t.importo;
          }
        }
      });

      const saldo = totaleEntrate - totaleUscite;

      document.getElementById('totale-entrate').textContent = `€${totaleEntrate.toFixed(2)}`;
      document.getElementById('totale-uscite').textContent = `€${totaleUscite.toFixed(2)}`;
      document.getElementById('saldo-totale').textContent = `€${saldo.toFixed(2)}`;
    }

    document.getElementById('filtro-tipo').addEventListener('change', aggiornaTabella);
    document.getElementById('mostra-eliminati').addEventListener('change', aggiornaTabella);

    document.getElementById('backup-btn').addEventListener('click', () => {
      const dataStr = JSON.stringify({ transactions, salvadanaio: parseFloat(document.getElementById('totale-salvadanaio').textContent.replace('€', '')) }, null, 2);
      const dataBlob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(dataBlob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `backup-${new Date().toISOString().split('T')[0]}.json`;
      link.click();
    });

    document.getElementById('restore-btn').addEventListener('click', () => {
      document.getElementById('file-input').click();
    });

    document.getElementById('file-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        try {
          const data = JSON.parse(event.target.result);
          if (confirm('Ripristinare il backup? I dati attuali saranno sovrascritti.')) {
            if (data.transactions) {
              const transactionsRef = ref(database, `transactions/${currentUser.uid}`);
              set(transactionsRef, null).then(() => {
                data.transactions.forEach(t => {
                  const newRef = push(transactionsRef);
                  set(newRef, t);
                });
              });
            }
            if (data.salvadanaio !== undefined) {
              const piggyBankRef = ref(database, `piggybank/${currentUser.uid}`);
              set(piggyBankRef, data.salvadanaio);
            }
            alert('Backup ripristinato con successo!');
          }
        } catch (error) {
          alert('Errore nel ripristino: ' + error.message);
        }
      };
      reader.readAsText(file);
    });
  </script>
</body>
</html>
