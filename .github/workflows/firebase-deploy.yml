name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Write Service Account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_BUDGET_FAMIGLIA_4477E }}' > $HOME/service-account.json

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project budget-famiglia-4477e
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.HOME }}/service-account.json
